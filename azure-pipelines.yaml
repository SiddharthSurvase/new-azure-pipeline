trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- script: |
    sudo apt-get update
    sudo apt-get install -y mono-complete
    mono --version
  displayName: 'Install Mono'

- script: |
    echo "Installing .NET SDK..."
    sudo apt update
    sudo apt install dotnet-sdk-8.0 -y
    dotnet --version
    dotnet helloworld.cs
  displayName: 'Install .NET SDK'

